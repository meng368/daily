<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>左侧选择 右侧显示</title>
    <style>
        /* 整体布局：左右分栏 */
        .container {
            display: flex;
            width: 90%;
            margin: 20px auto;
            height: 500px;
            border: 1px solid #ccc;
        }

        /* 左侧选择区样式 */
        .left-select {
            width: 250px;
            padding: 10px;
            border-right: 1px solid #ccc;
            background-color: #f8f8f8;
        }

        /* 右侧显示区样式 */
        .right-display {
            flex: 1;
            padding: 20px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
        }

        /* 选择项按钮样式 */
        .select-item {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            background-color: #e0e0e0;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
        }

        .select-item:hover {
            background-color: #d0d0d0;
        }

        .select-item.active {
            background-color: #2196F3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧选择区域 -->
        <div class="left-select">
            <h3>请选择内容</h3>
            <button class="select-item" data-content="这是选项1的详细内容～">选项1</button>
            <button class="select-item" data-content="选项2的内容来啦 ✨">选项2</button>
            <button class="select-item" data-content="你选中了选项3，这是对应的显示文本">选项3</button>
            <button class="select-item" data-content="选项4的专属内容，只有选中才会显示">选项4</button>
        </div>

        <!-- 右侧显示区域 -->
        <div class="right-display" id="display-area">
            请点击左侧选项查看对应内容
        </div>
    </div>

    <script>
        // 获取所有选择项和显示区域
        const selectItems = document.querySelectorAll('.select-item');
        const displayArea = document.getElementById('display-area');

        // 为每个选择项绑定点击事件
        selectItems.forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有选项的激活样式
                selectItems.forEach(i => i.classList.remove('active'));
                // 给当前点击的选项添加激活样式
                this.classList.add('active');
                // 获取自定义属性中的内容，显示到右侧区域
                const content = this.getAttribute('data-content');
                displayArea.textContent = content;
            });
        });
    </script>
</body>
</html>
